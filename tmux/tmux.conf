
set-option -g update-environment "PATH PYENV_ROOT PYENV_VERSION"
set -g default-terminal "screen-256color"
set -g prefix C-]
set -g mouse on
unbind C-b
bind-key C-] send-prefix

# remap vertical split to C-a |. pipe is more intuitive
unbind %
bind | split-window -h
# remap horizontal split to C-a -. hyphen is more intuitive
unbind '"'
bind - split-window -v

# bind tmux config refresh to C-a r
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# add bindings to resize panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5

# add binding to mazimize a pane
bind -r m resize-pane -Z

# handy for using the mouse to resize panes
# set -g mouse off

# plugin manager
set -g @plugin 'tmux-plugins/tpm'

# tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'

# settings for yazi
# https://yazi-rs.github.io/docs/image-preview/#tmux-users
# need to have at least version 3.3 of tmux which isn't in Ubunut until
# Noble numbat or later
#set -g allow-passthrough all
#set -ga update-environment TERM
#set -ga update-environment TERM_PROGRAM
set-option -sg escape-time 10
set-option -g focus-events on

# vi mode copying
set-window-option -g mode-keys vi
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# keep this init at the bottom
run  '~/.tmux/plugins/tpm/tpm'

# for neovim colors
set -as terminal-features ',*:RGB'

# suggested for sesh
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session




# global sessions
# bind-key "K" display-popup -h 90% -w 50% -E "sesh ui"
bind-key "k" run-shell "sesh connect \"$(
  sesh list --icons --hide-duplicates | fzf-tmux -p 100%,100% --no-border \
    --list-border \
    --no-sort --prompt '⚡  ' \
    --input-border \
    --header-border \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-b:abort' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:70%' \
    --preview 'sesh preview {}' \
)\""

bind-key "n" display-popup -E "sesh ui"

# root sessions
bind-key "r" run-shell "sesh connect \"\$(
  sesh list --icons | fzf-tmux -p 100%,100% --no-border \
    --query  \"\$(sesh root)\" \
    --list-border \
    --no-sort --prompt '⚡  ' \
    --input-border \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-b:abort' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:70%' \
    --preview 'sesh preview {}' \
)\""

